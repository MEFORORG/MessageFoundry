# Fan-out baseline — an ADT-dominant mixed feed at high fan-out, modelling the SHAPE of a large
# integration estate (one big ADT hub fanning to many destinations, plus results/orders hubs) so the
# run characterizes the engine under a realistic mix. Serve harness/config/load with a generous
# MEFOR_LOAD_FANOUT, then: python -m harness --load fanout-baseline --engine URL --token T
#
# IMPORTANT: every number here is generic and synthetic. The weights are an illustrative *shape*
# (ADT-dominant), NOT any real site's message percentages; the hosts are loopback; the labels are
# generic. No real partner, site code, IP, or volume appears in this file — see docs/LOAD-TESTING.md.

[load]
name = "fanout-baseline"
description = "ADT-dominant mixed feed at high fan-out; characterizes the engine under a realistic mix"
pool_size = 64
corpus_count_per_trigger = 20
poll_interval_s = 1.0
drain_timeout_s = 120.0
correlator_capacity = 2000000

[[load.target]]
name = "adt_hub"
port = 2600
types = ["ADT"]
weight = 6.0

[[load.target]]
name = "results_hub"
port = 2601
types = ["ORU", "ORM", "OML"]
weight = 3.0

[[load.target]]
name = "other_hub"
port = 2602
types = ["SIU", "RDE", "RAS", "DFT", "MDM", "MFN", "BAR"]
weight = 1.0

# Illustrative ADT-dominant shape (weights are relative, normalized at load).
[load.mix]
ADT = 55.0
ORU = 18.0
ORM = 10.0
SIU = 5.0
RDE = 4.0
RAS = 3.0
DFT = 2.0
MDM = 1.0
MFN = 1.0
BAR = 1.0

[load.slo]
min_sustained_msg_s = 200.0
max_ack_p99_ms = 50.0
max_e2e_p99_ms = 5000.0
max_error_rate = 0.001
max_drain_seconds = 60.0
zero_loss = true

[[load.phase]]
name = "warmup"
kind = "warmup"
loop = "open"
rate_start = 50.0
duration_s = 15.0

[[load.phase]]
name = "ramp"
kind = "ramp"
loop = "open"
rate_start = 50.0
rate_end = 800.0
duration_s = 60.0

[[load.phase]]
name = "sustained"
kind = "sustained"
loop = "open"
rate_start = 800.0
duration_s = 180.0

[[load.phase]]
name = "spike"
kind = "spike"
loop = "open"
rate_start = 2000.0
duration_s = 20.0

[[load.phase]]
name = "recovery"
kind = "sustained"
loop = "open"
rate_start = 800.0
duration_s = 60.0
