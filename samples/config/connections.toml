# Connections authored as DATA (ADR 0007) — an alternative to declaring inbound()/outbound() in a
# .py module. The loader merges these into the SAME registry as the code-first connections, so they
# coexist freely. Routing/transform LOGIC stays code-first: this inbound binds the `acme_adt_router`
# declared in IB_ACME_ADT.py and reuses its `acme_adt_handler` → `OB_ACME_ADT` chain.
#
# Edit this file by hand OR from the VS Code connection editor — both write the same TOML.
# Secrets/peers are never inline: use { env = "key" }, resolved from environments/<env>.toml or
# MEFOR_VALUE_<KEY> at connector-build time.

[[inbound]]
name      = "IB_ACME_ADT_TCP"          # a second ACME intake, authored as data
transport = "mllp"
router    = "acme_adt_router"          # picked from the routers registered in the .py modules
  [inbound.settings]
  port = 2700                          # inbound MLLP takes only a port (bind host is a service setting)

# Example of a data-authored OUTBOUND with an env() reference (commented — OB_ACME_ADT already exists
# in IB_ACME_ADT.py, and a name declared in both surfaces is a hard duplicate error):
#
# [[outbound]]
# name      = "OB_ACME_ADT_BACKUP"
# transport = "mllp"
# ordering  = "fifo"
#   [outbound.settings]
#   host = { env = "acme_adt_host" }
#   port = { env = "acme_adt_port", cast = "int" }
#   [outbound.retry]
#   max_attempts = 5

# --- IB_DEMO_ORU: the per-feed "Hybrid" layout worked example (docs/CONNECTIONS.md §"Decomposing by
# role"). The connections live HERE as data; the @router / @handler / transform steps live in the
# sibling IB_DEMO_ORU_router.py / IB_DEMO_ORU_handler.py / _demo_oru_transforms.py. One feed, split by
# role — no monolithic module bundling transport + routing + transform.
[[inbound]]
name      = "IB_DEMO_ORU"
transport = "mllp"
router    = "demo_oru_router"          # bound by name to the @router in IB_DEMO_ORU_router.py
  [inbound.settings]
  port = 2640                          # inbound MLLP takes only a port (bind host is a service setting)

[[outbound]]
name      = "OB_DEMO_ORU"              # referenced by name from IB_DEMO_ORU_handler.py
transport = "mllp"
  [outbound.settings]
  host = { env = "demo_oru_host" }            # resolved per environment (environments/<env>.toml)
  port = { env = "demo_oru_port", cast = "int" }
