# DEV environment values — resolved by env("key") in the message graph (see docs/CONFIGURATION.md).
# Non-secret values only; versioned in the repo so they're diffable/reviewable. Secrets come from
# MEFOR_VALUE_<KEY> environment variables, never this file. Keys are lower_snake_case.
#
# Active environment is selected by [ai].environment / `serve --env dev`.

# Downstream peer for OB_ACME_ADT (samples/config/IB_ACME_ADT.py): a local test receiver in DEV.
acme_adt_host = "127.0.0.1"
acme_adt_port = 2601

# Downstream payer for OB_PAYER_X12 (samples/config/IB_PARTNER_X12.py): a local test receiver in DEV.
payer_x12_host = "127.0.0.1"
payer_x12_port = 2701

# WS-* SOAP submit (samples/config/IB_IMMUNIZATION_VXU.py). Non-secret endpoint only; the client
# cert/key/password + WS-Security credentials come from MEFOR_VALUE_REGISTRY_* env vars, never here.
registry_url = "https://127.0.0.1:8443/iis/services/submit"

# Real-time eligibility peers (samples/config/IB_RTE_ELIGIBILITY.py): local test receivers in DEV.
payer_rte_host = "127.0.0.1"
payer_rte_port = 2731
rte_result_host = "127.0.0.1"
rte_result_port = 2732

# FHIR server BASE url for OB_FHIR_SERVER (samples/config/IB_FHIR_INTAKE.py): a local test server in DEV.
# A SMART/OAuth bearer token (if any) is a secret from MEFOR_VALUE_FHIR_BEARER_TOKEN, never this file.
fhir_base_url = "http://127.0.0.1:8480/fhir"

# Downstream dictation/reporting system (PowerScribe analog) for OB_POWERSCRIBE
# (samples/config/IB_RADIOLOGY_SR.py): a local test MLLP receiver in DEV (ADR 0025).
powerscribe_host = "127.0.0.1"
powerscribe_port = 2761

# Downstream results receiver for OB_DEMO_ORU (the per-feed "Hybrid" layout example authored across
# connections.toml + IB_DEMO_ORU_router.py + IB_DEMO_ORU_handler.py): a local test receiver in DEV.
demo_oru_host = "127.0.0.1"
