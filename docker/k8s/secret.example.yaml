#
# EXAMPLE secret — DO NOT commit real values, and DO NOT paste PEM key material into a git-tracked file.
# Create the Secret out-of-band (sealed-secrets / external-secrets), or with a one-liner that pulls the
# cert/key from local files (never inline):
#
#   kubectl create secret generic mefor-secrets \
#     --from-file=api.crt=tls/api.crt \
#     --from-file=api.key=tls/api.key \
#     --from-literal=store-encryption-key="$(messagefoundry gen-key)" \
#     --from-literal=api-tls-key-password=""     # omit/empty if the API key is unencrypted
#
# The store key is base64 of 32 random bytes (mint with `messagefoundry gen-key`). The MLLP key must be
# UNENCRYPTED unless the MLLP() connection sets tls_key_password (env-sourced).
#
# The YAML below shows ONLY the two literal values (injected as env vars via secretKeyRef). The mounted
# TLS files (keys `api.crt` / `api.key`, consumed by the `tls` volume in statefulset.yaml) are added via
# the `--from-file` flags above — kept out of this file so no key material lands in git.
apiVersion: v1
kind: Secret
metadata:
  name: mefor-secrets
type: Opaque
stringData:
  store-encryption-key: "REPLACE_base64_32_bytes_from_messagefoundry_gen-key"
  api-tls-key-password: "REPLACE_or_omit_if_the_api_key_is_unencrypted"
